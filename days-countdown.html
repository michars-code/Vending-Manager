<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>Days</title>
<style>
  :root {
    --bg: #1A1816;
    --bg-row: #211E1B;
    --ink: #EDE8DF;
    --ink-dim: #9A938A;
    --rule: #34302B;
    --amber: #D97B3F;
    --sage: #6B8068;
    --danger: #C25450;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    height: 100%;
    overscroll-behavior-y: none;
  }

  body {
    font-family: 'Iosevka Web', 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  .label-font {
    font-family: -apple-system, 'Inter', 'Helvetica Neue', Arial, sans-serif;
  }

  header {
    padding: 28px 20px 14px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .eyebrow {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .today-date {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--ink-dim);
  }

  main {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 160px;
  }

  .board {
    border-top: 1px solid var(--rule);
  }

  .row {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg-row);
    overflow: hidden;
  }

  .row.swiping { transition: none; }

  .row-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    width: 100%;
    transform: translateX(0);
    transition: transform 0.2s ease;
    background: var(--bg-row);
    position: relative;
    z-index: 2;
  }

  .row-delete {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 84px;
    background: var(--danger);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.04em;
    border: none;
    z-index: 1;
  }

  .row-meta {
    min-width: 0;
    flex: 1;
  }

  .row-label {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-sub {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .recur-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--sage);
    display: inline-block;
    flex-shrink: 0;
  }

  .row-count {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-shrink: 0;
  }

  .row-count .num {
    font-size: 40px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    transition: color 0.3s ease;
  }

  .row-count .unit {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .row-count.urgent .num { color: var(--amber); }
  .row-count.today .num { color: var(--amber); }
  .row-count.past .num { color: var(--ink-dim); }

  .digit-flip {
    display: inline-block;
    animation: flip 0.5s ease;
  }

  @keyframes flip {
    0% { transform: translateY(-8px) scale(0.96); opacity: 0; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }

  .empty-state {
    padding: 60px 28px;
    text-align: center;
  }

  .empty-state .glyph {
    font-size: 32px;
    color: var(--ink-dim);
    margin-bottom: 14px;
    letter-spacing: 0.2em;
  }

  .empty-state p {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink-dim);
    line-height: 1.5;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 26px 20px 10px;
  }

  .section-divider .eyebrow {
    flex-shrink: 0;
  }

  .section-divider .rule-line {
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  .chick-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg-row);
  }

  .chick-meta { min-width: 0; flex: 1; }

  .chick-name {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .chick-sub {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 3px;
  }

  .chick-age {
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-shrink: 0;
  }

  .chick-age .num {
    font-size: 40px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--sage);
  }

  .chick-age .unit {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 11px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .chick-weeks {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 4px;
    text-align: right;
  }

  .chick-weeks strong {
    color: var(--sage);
    font-weight: 600;
  }

  .workout-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 22px 20px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg-row);
  }

  .workout-checkbox {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 2px solid var(--ink-dim);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
  }

  .workout-checkbox.checked {
    background: var(--amber);
    border-color: var(--amber);
  }

  .workout-checkbox svg {
    width: 16px;
    height: 16px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .workout-checkbox.checked svg {
    opacity: 1;
  }

  .workout-meta { flex: 1; min-width: 0; }

  .workout-count {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }

  .workout-count .num {
    font-size: 40px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .workout-count.zero .num { color: var(--amber); }

  .workout-label {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .workout-sub {
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-dim);
    margin-top: 2px;
  }

  .fab {
    position: fixed;
    bottom: 28px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--bg);
    border: none;
    font-size: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    line-height: 1;
    z-index: 10;
  }

  .fab-secondary {
    bottom: 96px;
    background: var(--sage);
    color: var(--bg);
    font-size: 22px;
  }

  .fab:active { transform: scale(0.94); }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: flex-end;
    z-index: 20;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--bg-row);
    width: 100%;
    border-radius: 18px 18px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0));
    border-top: 1px solid var(--rule);
    font-family: -apple-system, 'Inter', sans-serif;
  }

  .modal h2 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 12px;
    color: var(--ink-dim);
    margin-bottom: 6px;
    letter-spacing: 0.03em;
  }

  .field input[type="text"],
  .field input[type="date"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--ink);
    font-size: 16px;
    font-family: inherit;
  }

  .field input:focus {
    outline: none;
    border-color: var(--ink-dim);
  }

  .recur-toggle {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .recur-chip {
    padding: 9px 14px;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--bg);
    color: var(--ink-dim);
    font-size: 13px;
    cursor: pointer;
  }

  .recur-chip.active {
    background: var(--sage);
    color: var(--bg);
    border-color: var(--sage);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }

  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-secondary { background: transparent; color: var(--ink-dim); border: 1px solid var(--rule); }

  .btn-text-delete {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    background: none;
    border: none;
    color: var(--danger);
    font-family: -apple-system, 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }

  @media (prefers-reduced-motion: reduce) {
    .digit-flip { animation: none; }
    .row-content { transition: none; }
  }
</style>
</head>
<body>

<header>
  <span class="eyebrow">Days</span>
  <span class="today-date" id="todayDate"></span>
</header>

<main>
  <div class="board" id="board"></div>

  <div class="section-divider">
    <span class="eyebrow">Chick ages</span>
    <span class="rule-line"></span>
  </div>
  <div class="board" id="chickBoard"></div>

  <div class="section-divider">
    <span class="eyebrow">Workouts</span>
    <span class="rule-line"></span>
  </div>
  <div class="board" id="workoutBoard"></div>
</main>

<button class="fab" id="addBtn" aria-label="Add countdown">+</button>
<button class="fab fab-secondary" id="addChickBtn" aria-label="Add chick">🐣</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2 id="modalTitle">New countdown</h2>
    <div class="field">
      <label for="inputLabel">What's it counting down to</label>
      <input type="text" id="inputLabel" placeholder="e.g. Flight to Lisbon" maxlength="40">
    </div>
    <div class="field">
      <label for="inputDate">Date</label>
      <input type="date" id="inputDate">
    </div>
    <div class="field">
      <label>Repeats</label>
      <div class="recur-toggle" id="recurToggle">
        <div class="recur-chip active" data-val="none">No</div>
        <div class="recur-chip" data-val="yearly">Yearly</div>
        <div class="recur-chip" data-val="monthly">Monthly</div>
        <div class="recur-chip" data-val="weekly">Weekly</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="chickModalBackdrop">
  <div class="modal">
    <h2 id="chickModalTitle">New chick</h2>
    <div class="field">
      <label for="chickInputName">Name or batch</label>
      <input type="text" id="chickInputName" placeholder="e.g. Henrietta, or Batch 3" maxlength="40">
    </div>
    <div class="field">
      <label for="chickInputDate">Hatch date</label>
      <input type="date" id="chickInputDate">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="chickCancelBtn">Cancel</button>
      <button class="btn btn-primary" id="chickSaveBtn">Save</button>
    </div>
    <button class="btn-text-delete" id="chickDeleteBtn" style="display:none;">Delete this chick</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'countdowns_v1';
  const CHICK_STORAGE_KEY = 'chicks_v1';
  const WORKOUT_STORAGE_KEY = 'workout_v1';
  let countdowns = [];
  let chicks = [];
  let lastWorkoutDate = null; // 'YYYY-MM-DD' string or null
  let editingId = null;
  let editingChickId = null;
  let recurValue = 'none';

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      countdowns = raw ? JSON.parse(raw) : [];
    } catch (e) {
      countdowns = [];
    }
    try {
      const rawChicks = localStorage.getItem(CHICK_STORAGE_KEY);
      chicks = rawChicks ? JSON.parse(rawChicks) : [];
    } catch (e) {
      chicks = [];
    }
    try {
      lastWorkoutDate = localStorage.getItem(WORKOUT_STORAGE_KEY) || null;
    } catch (e) {
      lastWorkoutDate = null;
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(countdowns));
  }

  function saveChicks() {
    localStorage.setItem(CHICK_STORAGE_KEY, JSON.stringify(chicks));
  }

  function saveWorkout() {
    if (lastWorkoutDate) {
      localStorage.setItem(WORKOUT_STORAGE_KEY, lastWorkoutDate);
    } else {
      localStorage.removeItem(WORKOUT_STORAGE_KEY);
    }
  }

  function uid() {
    return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  // Parse 'YYYY-MM-DD' as a local date at midnight, avoiding TZ shift bugs.
  function parseLocalDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function startOfToday() {
    const t = new Date();
    return new Date(t.getFullYear(), t.getMonth(), t.getDate());
  }

  function todayDateString() {
    const t = new Date();
    const y = t.getFullYear();
    const m = String(t.getMonth() + 1).padStart(2, '0');
    const d = String(t.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function daysBetween(a, b) {
    const MS = 24 * 60 * 60 * 1000;
    return Math.round((b - a) / MS);
  }

  // Given a base date + recurrence, find the next occurrence on/after today.
  function nextOccurrence(baseDateStr, recur) {
    const base = parseLocalDate(baseDateStr);
    const today = startOfToday();

    if (recur === 'none') return base;

    let next = new Date(base);

    if (recur === 'yearly') {
      next.setFullYear(today.getFullYear());
      if (next < today) next.setFullYear(next.getFullYear() + 1);
    } else if (recur === 'monthly') {
      next = new Date(today.getFullYear(), today.getMonth(), base.getDate());
      if (next < today) next = new Date(today.getFullYear(), today.getMonth() + 1, base.getDate());
    } else if (recur === 'weekly') {
      const diff = daysBetween(base, today) % 7;
      const mod = diff < 0 ? diff + 7 : diff;
      next = new Date(today);
      if (mod !== 0) next.setDate(today.getDate() + (7 - mod));
    }
    return next;
  }

  function formatDateShort(d) {
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function recurLabel(r) {
    return { yearly: 'Yearly', monthly: 'Monthly', weekly: 'Weekly' }[r] || '';
  }

  function render() {
    const board = document.getElementById('board');
    document.getElementById('todayDate').textContent =
      startOfToday().toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });

    if (countdowns.length === 0) {
      board.innerHTML = `
        <div class="empty-state">
          <div class="glyph">– – –</div>
          <p>Nothing on the board yet.<br>Tap + to add a date worth counting toward.</p>
        </div>`;
      return;
    }

    const today = startOfToday();

    const enriched = countdowns.map(c => {
      const occ = nextOccurrence(c.date, c.recur);
      const diff = daysBetween(today, occ);
      return { ...c, occ, diff };
    });

    enriched.sort((a, b) => a.diff - b.diff);

    board.innerHTML = enriched.map(c => {
      let stateClass = '';
      let numText, unitText;

      if (c.diff === 0) {
        stateClass = 'today';
        numText = 'Today';
        unitText = '';
      } else if (c.diff < 0) {
        stateClass = 'past';
        numText = Math.abs(c.diff);
        unitText = c.diff === -1 ? 'day ago' : 'days ago';
      } else {
        numText = c.diff;
        unitText = c.diff === 1 ? 'day left' : 'days left';
        if (c.diff <= 7) stateClass = 'urgent';
      }

      const sub = c.recur !== 'none'
        ? `<span class="recur-dot"></span>${recurLabel(c.recur)} · ${formatDateShort(c.occ)}`
        : formatDateShort(c.occ);

      return `
        <div class="row" data-id="${c.id}">
          <button class="row-delete" data-id="${c.id}">Delete</button>
          <div class="row-content" data-id="${c.id}">
            <div class="row-meta">
              <div class="row-label">${escapeHtml(c.label)}</div>
              <div class="row-sub">${sub}</div>
            </div>
            <div class="row-count ${stateClass}">
              <span class="num">${numText}</span>
              ${unitText ? `<span class="unit">${unitText}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');

    attachSwipeHandlers();
  }

  function renderChicks() {
    const board = document.getElementById('chickBoard');

    if (chicks.length === 0) {
      board.innerHTML = `
        <div class="empty-state">
          <div class="glyph">· · ·</div>
          <p>No chicks yet.<br>Tap 🐣 to log a hatch date.</p>
        </div>`;
      return;
    }

    const today = startOfToday();

    const enriched = chicks.map(c => {
      const hatch = parseLocalDate(c.hatchDate);
      const ageDays = daysBetween(hatch, today);
      const weeks = Math.round(ageDays / 7);
      return { ...c, hatch, ageDays, weeks };
    });

    enriched.sort((a, b) => a.ageDays - b.ageDays);

    board.innerHTML = enriched.map(c => {
      const dayLabel = c.ageDays === 1 ? 'day old' : 'days old';
      const weekLabel = c.weeks === 1 ? 'week' : 'weeks';

      return `
        <div class="chick-row" data-id="${c.id}">
          <div class="chick-meta">
            <div class="chick-name">${escapeHtml(c.name)}</div>
            <div class="chick-sub">Hatched ${formatDateShort(c.hatch)}</div>
          </div>
          <div>
            <div class="chick-age">
              <span class="num">${c.ageDays}</span>
              <span class="unit">${dayLabel}</span>
            </div>
            <div class="chick-weeks">~ <strong>${c.weeks}</strong> ${weekLabel}</div>
          </div>
        </div>`;
    }).join('');

    attachChickHandlers();
  }

  function attachChickHandlers() {
    document.querySelectorAll('.chick-row').forEach(el => {
      el.addEventListener('click', () => openEditChick(el.dataset.id));
    });
  }

  function openEditChick(id) {
    const c = chicks.find(x => x.id === id);
    if (!c) return;
    editingChickId = id;
    document.getElementById('chickModalTitle').textContent = 'Edit chick';
    document.getElementById('chickInputName').value = c.name;
    document.getElementById('chickInputDate').value = c.hatchDate;
    document.getElementById('chickDeleteBtn').style.display = 'block';
    openChickModal();
  }

  function openNewChick() {
    editingChickId = null;
    document.getElementById('chickModalTitle').textContent = 'New chick';
    document.getElementById('chickInputName').value = '';
    document.getElementById('chickInputDate').value = '';
    document.getElementById('chickDeleteBtn').style.display = 'none';
    openChickModal();
  }

  function openChickModal() {
    document.getElementById('chickModalBackdrop').classList.add('open');
  }

  function closeChickModal() {
    document.getElementById('chickModalBackdrop').classList.remove('open');
  }

  function deleteChick(id) {
    chicks = chicks.filter(c => c.id !== id);
    saveChicks();
    renderChicks();
  }

  function renderWorkout() {
    const board = document.getElementById('workoutBoard');
    const today = startOfToday();
    const checkedToday = lastWorkoutDate === todayDateString();

    let numText, subText, zeroClass = '';

    if (!lastWorkoutDate) {
      numText = '—';
      subText = 'Tap the box on a workout day to start tracking';
    } else {
      const last = parseLocalDate(lastWorkoutDate);
      const diff = daysBetween(last, today);
      numText = diff;
      if (diff === 0) zeroClass = 'zero';
      subText = diff === 0
        ? "You're checked in for today"
        : `Last workout ${formatDateShort(last)}`;
    }

    board.innerHTML = `
      <div class="workout-row">
        <button class="workout-checkbox ${checkedToday ? 'checked' : ''}" id="workoutCheckbox" aria-label="Mark today as a workout day" aria-pressed="${checkedToday}">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
        <div class="workout-meta">
          <div class="workout-count ${zeroClass}">
            <span class="num">${numText}</span>
            <span class="workout-label">${numText === 1 ? 'day' : 'days'} since last workout</span>
          </div>
          <div class="workout-sub">${subText}</div>
        </div>
      </div>`;

    document.getElementById('workoutCheckbox').addEventListener('click', toggleWorkoutToday);
  }

  function toggleWorkoutToday() {
    const today = todayDateString();
    if (lastWorkoutDate === today) {
      // Un-check today's box. Fall back to whatever was logged before isn't tracked,
      // so this simply clears it — next tap will re-log today.
      lastWorkoutDate = null;
    } else {
      lastWorkoutDate = today;
    }
    saveWorkout();
    renderWorkout();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Swipe to delete ---
  function attachSwipeHandlers() {
    document.querySelectorAll('.row-content').forEach(el => {
      let startX = 0, currentX = 0, dragging = false;

      el.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        dragging = true;
        el.style.transition = 'none';
      }, { passive: true });

      el.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        currentX = e.touches[0].clientX - startX;
        if (currentX > 0) currentX = 0;
        if (currentX < -84) currentX = -84;
        el.style.transform = `translateX(${currentX}px)`;
      }, { passive: true });

      el.addEventListener('touchend', () => {
        dragging = false;
        el.style.transition = 'transform 0.2s ease';
        if (currentX < -42) {
          el.style.transform = 'translateX(-84px)';
        } else {
          el.style.transform = 'translateX(0)';
        }
        currentX = 0;
      });

      // tap to open edit (only if not mid-swipe)
      el.addEventListener('click', (e) => {
        const transform = el.style.transform;
        if (transform && transform.includes('-84')) return;
        openEdit(el.dataset.id);
      });
    });

    document.querySelectorAll('.row-delete').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteCountdown(btn.dataset.id);
      });
    });
  }

  function deleteCountdown(id) {
    countdowns = countdowns.filter(c => c.id !== id);
    save();
    render();
  }

  function openEdit(id) {
    const c = countdowns.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit countdown';
    document.getElementById('inputLabel').value = c.label;
    document.getElementById('inputDate').value = c.date;
    setRecurChip(c.recur);
    openModal();
  }

  function openNew() {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'New countdown';
    document.getElementById('inputLabel').value = '';
    document.getElementById('inputDate').value = '';
    setRecurChip('none');
    openModal();
  }

  function setRecurChip(val) {
    recurValue = val;
    document.querySelectorAll('.recur-chip').forEach(chip => {
      chip.classList.toggle('active', chip.dataset.val === val);
    });
  }

  function openModal() {
    document.getElementById('modalBackdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalBackdrop').classList.remove('open');
  }

  document.getElementById('addBtn').addEventListener('click', openNew);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);

  document.getElementById('addChickBtn').addEventListener('click', openNewChick);
  document.getElementById('chickCancelBtn').addEventListener('click', closeChickModal);

  document.getElementById('chickModalBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'chickModalBackdrop') closeChickModal();
  });

  document.getElementById('chickSaveBtn').addEventListener('click', () => {
    const name = document.getElementById('chickInputName').value.trim();
    const hatchDate = document.getElementById('chickInputDate').value;

    if (!name || !hatchDate) {
      const nameInput = document.getElementById('chickInputName');
      const dateInput = document.getElementById('chickInputDate');
      if (!name) nameInput.style.borderColor = 'var(--danger)';
      if (!hatchDate) dateInput.style.borderColor = 'var(--danger)';
      return;
    }

    if (editingChickId) {
      const c = chicks.find(x => x.id === editingChickId);
      c.name = name;
      c.hatchDate = hatchDate;
    } else {
      chicks.push({ id: uid(), name, hatchDate });
    }

    saveChicks();
    closeChickModal();
    renderChicks();
  });

  document.getElementById('chickDeleteBtn').addEventListener('click', () => {
    if (editingChickId) {
      deleteChick(editingChickId);
      closeChickModal();
    }
  });

  ['chickInputName', 'chickInputDate'].forEach(id => {
    document.getElementById(id).addEventListener('input', (e) => {
      e.target.style.borderColor = 'var(--rule)';
    });
  });

  document.getElementById('modalBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });

  document.getElementById('recurToggle').addEventListener('click', (e) => {
    const chip = e.target.closest('.recur-chip');
    if (chip) setRecurChip(chip.dataset.val);
  });

  document.getElementById('saveBtn').addEventListener('click', () => {
    const label = document.getElementById('inputLabel').value.trim();
    const date = document.getElementById('inputDate').value;

    if (!label || !date) {
      const labelInput = document.getElementById('inputLabel');
      const dateInput = document.getElementById('inputDate');
      if (!label) labelInput.style.borderColor = 'var(--danger)';
      if (!date) dateInput.style.borderColor = 'var(--danger)';
      return;
    }

    if (editingId) {
      const c = countdowns.find(x => x.id === editingId);
      c.label = label;
      c.date = date;
      c.recur = recurValue;
    } else {
      countdowns.push({ id: uid(), label, date, recur: recurValue });
    }

    save();
    closeModal();
    render();
  });

  // Reset border color on input
  ['inputLabel', 'inputDate'].forEach(id => {
    document.getElementById(id).addEventListener('input', (e) => {
      e.target.style.borderColor = 'var(--rule)';
    });
  });

  // Refresh at local midnight, and also periodically in case the tab stays open
  function scheduleMidnightRefresh() {
    const now = new Date();
    const next = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 5);
    setTimeout(() => { render(); renderChicks(); renderWorkout(); scheduleMidnightRefresh(); }, next - now);
  }

  load();
  render();
  renderChicks();
  renderWorkout();
  scheduleMidnightRefresh();

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const swCode = `
        const CACHE = 'days-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.add('./')));
        });
        self.addEventListener('fetch', e => {
          e.respondWith(
            caches.match(e.request).then(r => r || fetch(e.request))
          );
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
    });
  }
</script>
</body>
</html>
